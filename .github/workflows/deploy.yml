name: Deploy to Cloudflare Workers

on:
  workflow_dispatch: # 允许手动触发

# 部署所需权限
permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy Worker
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (dry-run)
        run: npm run build

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          # 管理员账号密码等敏感环境变量需在 Cloudflare Dashboard 手动设置：
          # https://dash.cloudflare.com/ -> Workers & Pages -> ai-gateway -> Settings -> Variables
          #   - ADMIN_USERNAME
          #   - ADMIN_PASSWORD
          # KV 命名空间 AI_GATEWAY 由 wrangler.toml 按名称自动解析。
